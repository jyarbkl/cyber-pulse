name: Fetch RSS Feeds

on:
  schedule:
    - cron: '0 11 * * *'   # 6:00 AM CDT / 7:00 AM CST
    - cron: '0 16 * * *'   # 11:00 AM CDT / 12:00 PM CST
  workflow_dispatch:        # Allow manual trigger from GitHub Actions UI

jobs:
  fetch-feeds:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # Required to commit feeds-data.json back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests feedparser beautifulsoup4 lxml

      - name: Fetch feeds and generate feeds-data.json
        run: python fetch_feeds.py

      - name: Commit and push feeds-data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feeds-data.json
          git diff --staged --quiet || git commit -m "chore: update feeds-data.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
